name: Robot Framework Tests

on:
  push:
    branches: [ main, feature/* ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Robot Framework
	    run: pip install robotframework

      - name: Run tests
	    run: robot robot-tests
